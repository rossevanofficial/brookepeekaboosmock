<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PEEKABOO Merch</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #050505;
      color: #ffffff;
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100vh;
      background:
        radial-gradient(circle at center, rgba(236, 72, 153, 0.25), transparent 35%),
        radial-gradient(circle at 80% 20%, rgba(244, 114, 182, 0.15), transparent 25%),
        #050505;
    }

    header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .brand {
      color: #ec4899;
      font-weight: 900;
      letter-spacing: 0.25em;
      font-size: 20px;
    }

    nav {
      display: flex;
      gap: 28px;
      text-transform: uppercase;
      font-size: 13px;
      letter-spacing: 0.15em;
      color: #d4d4d8;
    }

    nav a:hover {
      color: #f472b6;
    }

    .cart-button,
    .primary-button,
    .secondary-button,
    .product-button,
    .email-button {
      border: none;
      border-radius: 16px;
      padding: 14px 22px;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      letter-spacing: 0.08em;
    }

    .cart-button,
    .primary-button,
    .email-button {
      background: #db2777;
      color: white;
    }

    .cart-button:hover,
    .primary-button:hover,
    .email-button:hover {
      background: #ec4899;
    }

    .hero {
      max-width: 1200px;
      margin: 0 auto;
      padding: 50px 24px 80px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: center;
    }

    .badge {
      display: inline-block;
      margin-bottom: 22px;
      border: 1px solid rgba(236, 72, 153, 0.6);
      background: rgba(236, 72, 153, 0.12);
      color: #f9a8d4;
      padding: 10px 16px;
      border-radius: 999px;
      text-transform: uppercase;
      font-weight: 900;
      font-size: 12px;
      letter-spacing: 0.2em;
    }

    h1 {
      font-size: clamp(46px, 8vw, 92px);
      line-height: 0.95;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    h1 span {
      color: #ec4899;
    }

    .hero p {
      color: #d4d4d8;
      margin-top: 24px;
      max-width: 560px;
      font-size: 18px;
    }

    .hero-buttons {
      margin-top: 32px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .secondary-button {
      background: rgba(0, 0, 0, 0.45);
      color: white;
      border: 1px solid rgba(236, 72, 153, 0.7);
    }

    .secondary-button:hover {
      background: rgba(236, 72, 153, 0.12);
    }

    .logo-frame {
      position: relative;
      border: 1px solid rgba(236, 72, 153, 0.35);
      background: rgba(10, 10, 10, 0.75);
      border-radius: 32px;
      padding: 18px;
      box-shadow: 0 30px 80px rgba(219, 39, 119, 0.22);
    }

    .logo-frame img {
      display: block;
      width: 100%;
      border-radius: 24px;
      object-fit: contain;
    }

    .ticker {
      border-top: 1px solid rgba(236, 72, 153, 0.25);
      border-bottom: 1px solid rgba(236, 72, 153, 0.25);
      background: rgba(9, 9, 11, 0.9);
      padding: 18px 24px;
      text-align: center;
      color: #f472b6;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    .ticker span {
      display: inline-block;
      margin: 6px 18px;
    }

    section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 72px 24px;
    }
